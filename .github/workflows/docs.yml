name: Generate & Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Setup tbls
        uses: k1low/setup-tbls@v1

      - name: Start Supabase
        run: supabase start

      - name: Reset database (apply migrations + seed)
        run: supabase db reset

      - name: Install dbt dependencies
        working-directory: dbt
        run: uv sync

      - name: Run dbt models
        working-directory: dbt
        run: uv run dbt run --profiles-dir .

      # --- tbls ---
      - name: Generate tbls docs
        run: tbls doc

      # --- Liam ERD ---
      - name: Generate Liam ERD
        run: |
          npx --yes @liam-hq/cli erd build --format tbls \
            --input docs-generated/schema/schema.json \
            --output-dir docs-generated/erd

      # --- dbt docs ---
      - name: Generate dbt docs
        working-directory: dbt
        run: uv run dbt docs generate --profiles-dir .

      - name: Patch dbt docs for static hosting
        run: bash scripts/patch-dbt-docs.sh

      # --- Assemble site ---
      - name: Assemble _site
        run: |
          mkdir -p _site/schema _site/erd _site/dbt
          cp docs/index.html _site/
          cp -r docs-generated/schema/* _site/schema/
          cp -r docs-generated/erd/* _site/erd/
          cp dbt/target/index.html _site/dbt/
          # Include JSON as fallback (patched HTML has them inlined)
          cp dbt/target/manifest.json dbt/target/catalog.json _site/dbt/ 2>/dev/null || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3

      - name: Stop Supabase
        if: always()
        run: supabase stop

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
