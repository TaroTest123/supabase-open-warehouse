name: Generate & Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: postgres
      DBT_HOST: localhost
      DBT_PORT: "5432"
    services:
      postgres:
        image: supabase/postgres:15.6.1.143
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Setup tbls
        uses: k1low/setup-tbls@f25e3d013a596865b2db90dac7ee19e9f15b5780 # v1

      - name: Install pandoc
        run: sudo apt-get install -y --no-install-recommends pandoc

      - name: Apply migrations & seed
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            echo "Applying $f ..."
            psql -h localhost -U postgres -d postgres -f "$f"
          done
          echo "Applying seed data ..."
          psql -h localhost -U postgres -d postgres -f supabase/seed.sql

      - name: Install dbt dependencies
        working-directory: dbt
        run: uv sync

      - name: Run dbt models
        working-directory: dbt
        run: uv run dbt run --profiles-dir .

      # --- tbls ---
      - name: Generate tbls docs
        run: tbls doc --dsn "postgres://postgres:postgres@localhost:5432/postgres?sslmode=disable"

      - name: Convert tbls Markdown to HTML
        run: |
          cd docs-generated/schema
          # Write pandoc template to a temp file
          cat > /tmp/schema.html <<'TPL'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>$title$ - Schema Docs</title>
          <style>
          *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
          body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; max-width: 960px; margin: 0 auto; padding: 2rem; }
          a { color: #60a5fa; }
          h1, h2, h3 { color: #f8fafc; margin: 1.5rem 0 0.75rem; }
          h1 { font-size: 1.75rem; border-bottom: 1px solid #334155; padding-bottom: 0.5rem; }
          table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
          th, td { border: 1px solid #334155; padding: 0.5rem 0.75rem; text-align: left; }
          th { background: #1e293b; color: #94a3b8; font-size: 0.85rem; text-transform: uppercase; }
          td { font-size: 0.9rem; }
          tr:hover { background: #1e293b; }
          code { background: #1e293b; padding: 0.15rem 0.4rem; border-radius: 4px; font-size: 0.85rem; }
          img { max-width: 100%; height: auto; margin: 1rem 0; }
          .nav { margin-bottom: 1.5rem; }
          </style>
          </head>
          <body>
          <div class="nav"><a href="./">← Schema Docs</a></div>
          $body$
          </body>
          </html>
          TPL
          # Convert each .md to .html
          for md in *.md; do
            name="${md%.md}"
            # Replace .md links with .html before conversion
            sed 's/\.md)/\.html)/g; s/\.md#/\.html#/g' "$md" | \
              pandoc \
                --standalone \
                --metadata title="$(head -1 "$md" | sed 's/^#\+ //')" \
                --template=/tmp/schema.html \
                -o "${name}.html"
          done
          # Rename README.html to index.html
          mv README.html index.html

      # --- Liam ERD ---
      - name: Generate Liam ERD
        run: |
          npx --yes @liam-hq/cli erd build --format tbls \
            --input docs-generated/schema/schema.json \
            --output-dir docs-generated/erd

      # --- dbt docs ---
      - name: Generate dbt docs
        working-directory: dbt
        run: uv run dbt docs generate --profiles-dir .

      # --- Scalar API docs ---
      - name: Build Scalar API Reference
        run: |
          mkdir -p _site/api
          cp docs/openapi.yaml _site/api/openapi.yaml
          cat > _site/api/index.html <<'SCALAR_HTML'
          <!DOCTYPE html>
          <html lang="ja">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>API Reference - Supabase Open Warehouse</title>
          </head>
          <body>
            <script id="api-reference" data-url="./openapi.yaml"></script>
            <script src="https://cdn.jsdelivr.net/npm/@scalar/api-reference"></script>
          </body>
          </html>
          SCALAR_HTML

      # --- Assemble site ---
      - name: Assemble _site
        run: |
          mkdir -p _site/schema _site/erd
          cp docs/index.html _site/
          # Copy HTML, SVG, and JSON (skip .md source files)
          cp docs-generated/schema/*.html docs-generated/schema/*.svg docs-generated/schema/*.json _site/schema/
          cp -r docs-generated/erd/* _site/erd/
          cp -r dbt/target _site/dbt

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
