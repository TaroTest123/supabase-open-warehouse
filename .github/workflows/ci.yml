name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  schema-consistency:
    name: Mart schema consistency check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Check MART_TABLE_SCHEMAS matches dbt models
        run: |
          set -euo pipefail

          # Extract table names from constants.ts (## mart_xxx — description)
          frontend_tables=$(grep -oP '(?<=^## )\w+' frontend/src/lib/constants.ts | sort)
          if [ -z "$frontend_tables" ]; then
            echo "::error::No tables extracted from constants.ts — check the grep pattern"
            exit 1
          fi

          # Extract table names from dbt/models/mart/*.sql (filename without extension)
          dbt_tables=$(find dbt/models/mart -name 'mart_*.sql' -exec basename {} .sql \; | sort)
          if [ -z "$dbt_tables" ]; then
            echo "::error::No dbt mart models found in dbt/models/mart/"
            exit 1
          fi

          echo "=== Tables in constants.ts ==="
          echo "$frontend_tables"
          echo ""
          echo "=== Tables in dbt/models/mart/ ==="
          echo "$dbt_tables"
          echo ""

          # Check for tables in constants.ts but missing from dbt
          missing_from_dbt=$(comm -23 <(echo "$frontend_tables") <(echo "$dbt_tables")) || true
          if [ -n "$missing_from_dbt" ]; then
            echo "::error::Tables in constants.ts but missing dbt model: $missing_from_dbt"
            exit 1
          fi

          # Check for tables in dbt but missing from constants.ts
          missing_from_frontend=$(comm -13 <(echo "$frontend_tables") <(echo "$dbt_tables")) || true
          if [ -n "$missing_from_frontend" ]; then
            echo "::warning::Tables in dbt but missing from constants.ts: $missing_from_frontend"
          fi

          echo "✅ All tables in constants.ts have corresponding dbt models."

  frontend:
    name: Frontend (lint & build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v4
        with:
          package_json_file: frontend/package.json

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Biome check (lint + format)
        run: pnpm check

      - name: TypeScript type check
        run: pnpm exec tsc --noEmit

      - name: Next.js build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key-for-build

  dbt:
    name: dbt (test)
    runs-on: ubuntu-latest
    env:
      PGPASSWORD: postgres
      DBT_HOST: localhost
      DBT_PORT: "5432"
    services:
      postgres:
        image: supabase/postgres:15.6.1.143
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Apply migrations & seed
        run: |
          set -e
          for f in supabase/migrations/*.sql; do
            echo "Applying $f ..."
            psql -h localhost -U postgres -d postgres -f "$f"
          done
          echo "Applying seed data ..."
          psql -h localhost -U postgres -d postgres -f supabase/seed.sql

      - name: Setup uv
        uses: astral-sh/setup-uv@38f3f104447c67c051c4a08e39b64a148898af3a # v4

      - name: Install dbt dependencies
        working-directory: dbt
        run: uv sync

      - name: Run dbt models
        working-directory: dbt
        run: uv run dbt run --profiles-dir .

      - name: Run dbt tests
        working-directory: dbt
        run: uv run dbt test --profiles-dir .
