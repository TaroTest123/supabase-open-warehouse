name: Ingest TEPCO CSV

on:
  schedule:
    # 毎日 00:00 JST (15:00 UTC) — 当日実績 CSV
    - cron: "0 15 * * *"
    # 毎月3日 03:00 JST (18:00 UTC) — 前月分 ZIP
    - cron: "0 18 3 * *"
  workflow_dispatch:
    inputs:
      csv_url:
        description: "CSV URL (空欄で当日実績を取得)"
        required: false
        type: string

jobs:
  ingest:
    name: Fetch & upsert CSV
    runs-on: ubuntu-latest
    environment: Production
    steps:
      - name: Determine URL
        id: url
        env:
          INPUT_CSV_URL: ${{ inputs.csv_url }}
          SCHEDULE: ${{ github.event.schedule }}
        run: |
          if [ -n "$INPUT_CSV_URL" ]; then
            echo "target_url=$INPUT_CSV_URL" >> "$GITHUB_OUTPUT"
          elif [ "$SCHEDULE" = "0 18 3 * *" ]; then
            # 前月の YYYYMM を計算
            PREV_MONTH=$(date -u -d "$(date -u +%Y-%m-01) -1 month" +%Y%m)
            echo "target_url=https://www.tepco.co.jp/forecast/html/images/${PREV_MONTH}_power_usage.zip" >> "$GITHUB_OUTPUT"
          else
            echo "target_url=" >> "$GITHUB_OUTPUT"
          fi

      - name: Call ingest Edge Function
        id: ingest
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          TARGET_URL: ${{ steps.url.outputs.target_url }}
        run: |
          URL="${SUPABASE_URL}/functions/v1/ingest-tepco-csv"
          if [ -n "$TARGET_URL" ]; then
            URL="${URL}?url=${TARGET_URL}"
          fi
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$URL" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          echo "status=$HTTP_CODE" >> "$GITHUB_OUTPUT"
          echo "body=$BODY" >> "$GITHUB_OUTPUT"
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" -ge 400 ]; then
            echo "::error::Edge Function returned HTTP $HTTP_CODE"
            exit 1
          fi

  dbt-refresh:
    needs: ingest
    uses: ./.github/workflows/dbt-refresh.yml
    secrets:
      SUPABASE_DB_HOST: ${{ secrets.SUPABASE_DB_HOST }}
      SUPABASE_DB_USER: ${{ secrets.SUPABASE_DB_USER }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
