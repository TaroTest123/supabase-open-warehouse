version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: raw_tepco_demand
        description: "TEPCO でんき予報 CSV の生データ（1時間間隔）"
        columns:
          - name: id
            description: "サロゲートキー"
          - name: date_str
            description: "日付文字列 (YYYY/M/D)"
          - name: time_str
            description: "時刻文字列 (H:00 or H:30)"
          - name: demand_mw_str
            description: "需要実績 (万kW, TEXT)"
          - name: forecast_mw_str
            description: "予測値 (万kW, TEXT) — ZIP 1時間セクションのみ"
          - name: supply_capacity_mw_str
            description: "供給力 (万kW, TEXT)"
          - name: usage_pct_str
            description: "使用率 (%, TEXT)"
          - name: loaded_at
            description: "データ取り込み日時"

      - name: raw_weather_tokyo
        description: "Open-Meteo Historical Weather API による東京エリアの気象データ (1時間間隔)"
        columns:
          - name: id
            description: "サロゲートキー"
          - name: recorded_at
            description: "観測日時 (TIMESTAMPTZ)"
          - name: temperature_c
            description: "気温 (°C)"
          - name: relative_humidity_pct
            description: "相対湿度 (%)"
          - name: precipitation_mm
            description: "降水量 (mm)"
          - name: shortwave_radiation_wm2
            description: "短波放射 / 日射量 (W/m²)"
          - name: wind_speed_ms
            description: "風速 (m/s)"
          - name: wind_direction_deg
            description: "風向 (°)"
          - name: cloud_cover_pct
            description: "雲量 (%)"
          - name: pressure_hpa
            description: "海面気圧 (hPa)"
          - name: loaded_at
            description: "データ取り込み日時"

      - name: raw_tepco_demand_5min
        description: "TEPCO 月別 ZIP の5分間隔セクションの生データ"
        columns:
          - name: id
            description: "サロゲートキー"
          - name: date_str
            description: "日付文字列 (YYYY/M/D)"
          - name: time_str
            description: "時刻文字列 (H:MM)"
          - name: demand_mw_str
            description: "需要実績 (万kW, TEXT)"
          - name: solar_mw_str
            description: "太陽光発電実績 (万kW, TEXT)"
          - name: solar_pct_str
            description: "太陽光発電割合 (%, TEXT)"
          - name: loaded_at
            description: "データ取り込み日時"
