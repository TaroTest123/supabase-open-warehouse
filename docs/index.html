<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supabase Open Warehouse - Documentation</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #f8fafc;
    }
    .subtitle {
      color: #94a3b8;
      margin-bottom: 3rem;
      font-size: 1.1rem;
    }
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1.5rem;
      max-width: 960px;
      width: 100%;
    }
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 2rem;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, transform 0.2s;
    }
    .card:hover {
      border-color: #3b82f6;
      transform: translateY(-2px);
    }
    .card h2 {
      font-size: 1.25rem;
      color: #f8fafc;
      margin-bottom: 0.75rem;
    }
    .card p {
      color: #94a3b8;
      line-height: 1.6;
      font-size: 0.95rem;
    }
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.25rem 0.75rem;
      border-radius: 9999px;
      margin-bottom: 1rem;
    }
    .badge-blue { background: #1e3a5f; color: #60a5fa; }
    .badge-green { background: #14532d; color: #4ade80; }
    .badge-purple { background: #3b0764; color: #c084fc; }
    footer {
      margin-top: 3rem;
      color: #475569;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <h1>Supabase Open Warehouse</h1>
  <p class="subtitle">TEPCO 電力需要データウェアハウス - 自動生成ドキュメント</p>

  <div class="cards">
    <a class="card" href="./schema/">
      <span class="badge badge-blue">tbls</span>
      <h2>Schema Docs</h2>
      <p>テーブル定義書。カラム型・制約・インデックス情報を一覧表示します。</p>
    </a>

    <a class="card" href="./erd/">
      <span class="badge badge-green">Liam ERD</span>
      <h2>ER Diagram</h2>
      <p>インタラクティブな ER 図。テーブル間のリレーションを視覚的に確認できます。</p>
    </a>

    <a class="card" href="./dbt/">
      <span class="badge badge-purple">dbt</span>
      <h2>dbt Docs</h2>
      <p>データリネージとモデルドキュメント。データの流れと変換ロジックを確認できます。</p>
    </a>
  </div>

  <footer>Auto-generated by GitHub Actions on each push to main</footer>
</body>
</html>
